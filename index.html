<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0d4f31">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="麻雀スイーパー">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
  <title>麻雀マインスイーパー</title>
</head>
<body>

<!-- ── Title ─────────────────────────────────────────── -->
<div id="screen-title" class="screen">
  <div class="title-inner">
    <div class="title-emoji">🀄</div>
    <h1>麻雀<br>マインスイーパー</h1>
    <p class="subtitle">危険牌を見切れ！</p>
    <button id="btn-start" class="btn-primary">スタート</button>
    <button id="btn-how" class="btn-secondary">遊び方</button>
  </div>
</div>

<!-- ── How to play ───────────────────────────────────── -->
<div id="screen-how" class="screen">
  <div class="how-header">遊び方</div>
  <div class="how-body">
    <div class="how-step">
      <div class="step-num">1</div>
      <div class="step-text">相手がリーチ！捨て牌を確認する</div>
    </div>
    <div class="how-step">
      <div class="step-num">2</div>
      <div class="step-text">自分の手牌から「安全な牌」を選んで切る</div>
    </div>
    <div class="how-step">
      <div class="step-num">3</div>
      <div class="step-text">危険牌を切ったら振り込み！ライフ −1</div>
    </div>
    <div class="how-step">
      <div class="step-num">4</div>
      <div class="step-text">ライフ 0 でゲームオーバー。スコアを競おう！</div>
    </div>
    <div class="diff-section">
      <h3>難易度</h3>
      <div class="diff-row"><span class="diff-badge diff-beginner">初級</span> 現物（相手が捨てた牌）を探す</div>
      <div class="diff-row"><span class="diff-badge diff-medium">中級</span> 筋（スジ）読みが必要</div>
      <div class="diff-row"><span class="diff-badge diff-advanced">上級</span> 複合待ち・カンチャンに挑戦</div>
    </div>
    <button id="btn-how-back" class="btn-secondary">戻る</button>
  </div>
</div>

<!-- ── Game ──────────────────────────────────────────── -->
<div id="screen-game" class="screen">
  <div class="hud">
    <div id="lives-display">❤️❤️❤️</div>
    <div id="score-display">0</div>
    <div id="round-display">第 1 問</div>
  </div>
  <div class="game-body">
    <div class="problem-meta">
      <div class="riichi-banner">⚡ リーチ！</div>
      <span id="difficulty-badge" class="diff-badge diff-beginner">初級</span>
    </div>
    <div class="problem-title" id="problem-title"></div>
    <div class="problem-desc"  id="problem-desc"></div>

    <div>
      <div class="section-label">相手の捨て牌</div>
      <div class="tile-row" id="discards-row"></div>
    </div>

    <div>
      <div class="section-label">手牌から 1 枚切る ↓ タップして選択</div>
      <div class="tile-row" id="hand-row"></div>
    </div>
  </div>
</div>

<!-- ── Result overlay ───────────────────────────────── -->
<div id="result-overlay" class="overlay hidden">
  <div class="result-card">
    <div class="result-top">
      <div id="result-icon"></div>
      <div class="result-texts">
        <div id="result-title"></div>
        <div id="result-score"></div>
      </div>
    </div>
    <div class="result-divider"></div>
    <div id="result-wait"></div>
    <div id="result-explanation"></div>
    <div id="result-hand"></div>
    <button id="btn-next" class="btn-primary">次へ →</button>
  </div>
</div>

<!-- ── Game over ─────────────────────────────────────── -->
<div id="screen-gameover" class="screen">
  <div class="gameover-inner">
    <div class="gameover-emoji">💀</div>
    <h2>ゲームオーバー</h2>
    <div id="final-score"></div>
    <div id="final-round"></div>
    <button id="btn-retry" class="btn-primary">もう一度</button>
    <button id="btn-title" class="btn-secondary">タイトルへ</button>
  </div>
</div>

<script src="js/tiles.js"></script>
<script src="js/problems.js"></script>
<script src="js/game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a1a30">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="斬★牌★王">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
  <title>斬★牌★王</title>
</head>
<body>

<!-- ── Title ─────────────────────────────────────────── -->
<div id="screen-title" class="screen">
  <div class="title-inner">
    <div class="title-tile">斬</div>
    <h1>斬★牌★王</h1>
    <p class="subtitle">捨て牌ローグライク・バトル</p>
    <div id="title-hs" class="title-hs"></div>
    <button id="btn-start" class="btn-primary">スタート！</button>
    <div class="title-modes">
      <button id="btn-easy"  class="mode-toggle">💡 かんたん</button>
      <button id="btn-debug" class="mode-toggle">🛠 デバッグ</button>
    </div>
    <button id="btn-how" class="btn-secondary">遊び方</button>
  </div>
</div>

<!-- ── How to play ───────────────────────────────────── -->
<div id="screen-how" class="screen">
  <div class="how-header">遊び方</div>
  <div class="how-body">
    <div class="how-step">
      <div class="step-num">1</div>
      <div class="step-text">ライバルがリーチ！捨て牌を確認</div>
    </div>
    <div class="how-step">
      <div class="step-num">2</div>
      <div class="step-text">10秒以内に安全な牌を1枚タップ！</div>
    </div>
    <div class="how-step">
      <div class="step-num">3</div>
      <div class="step-text">安全牌→ライバルにダメージ！危険牌→自分のライフ−1</div>
    </div>
    <div class="how-step">
      <div class="step-num">4</div>
      <div class="step-text">ライバルHPを0にして倒せ！全員倒したら完全制覇！</div>
    </div>
    <div class="how-tip">
      <div class="tip-icon">💡</div>
      <div class="tip-text">捨て牌と同じ牌（現物）は絶対安全！<br>連続セーフでコンボボーナス！</div>
    </div>
    <button id="btn-how-back" class="btn-secondary">戻る</button>
  </div>
</div>

<!-- ── Game ──────────────────────────────────────────── -->
<div id="screen-game" class="screen">

  <!-- ▲ 相手ゾーン ─────────────────────────────────── -->
  <div class="zone-opp">
    <div class="rival-row">
      <span id="rival-icon" class="rival-icon"></span>
      <div class="rival-texts">
        <div id="rival-name"  class="rival-name"></div>
        <div id="rival-flavor" class="rival-flavor"></div>
      </div>
    </div>
    <div id="rival-hp-wrap" class="rival-hp-wrap">
      <div class="rival-hp-track">
        <div id="rival-hp-bar" class="rival-hp-fill"></div>
      </div>
      <div id="rival-hp-text" class="rival-hp-text">4 / 4</div>
    </div>
    <div class="discards-wrap">
      <div class="zone-tag">捨て牌</div>
      <div class="tile-row" id="discards-row"></div>
    </div>
  </div>

  <!-- ▶ バトルライン ────────────────────────────────── -->
  <div class="zone-battle">
    <div class="timer-track">
      <div id="timer-bar" class="timer-fill t-green"></div>
      <div id="timer-num" class="timer-num">10</div>
    </div>
    <div class="battle-row">
      <div class="riichi-banner" id="riichi-banner">⚡ リーチ！</div>
      <div id="round-display" class="round-label"></div>
    </div>
  </div>

  <!-- ▼ 自分ゾーン ─────────────────────────────────── -->
  <div class="zone-player">
    <div class="player-hud">
      <div id="lives-display">❤️❤️❤️</div>
      <div id="combo-display" class="combo-hidden"></div>
      <div id="score-display">0</div>
    </div>
    <div class="cut-line-row">
      <span class="cut-line">どれ切る？</span>
      <button id="btn-hint" class="btn-hint">💡 現物</button>
    </div>
    <div class="hand-area">
      <div class="tile-row hand-row" id="hand-row"></div>
    </div>
  </div>

</div>

<!-- ── Upgrade shop ───────────────────────────────────── -->
<div id="screen-upgrade" class="screen">
  <div class="shop-header">
    <div class="shop-title">強化ショップ</div>
    <div class="shop-exp-row">
      <div id="shop-exp-earned" class="shop-exp-earned"></div>
      <div class="shop-exp-total">EXP: <span id="shop-exp">0</span></div>
    </div>
  </div>
  <div class="shop-list" id="shop-list"></div>
  <div class="shop-footer">
    <button id="btn-next-run" class="btn-primary">次のランへ →</button>
    <button id="btn-shop-title" class="btn-secondary">タイトルへ</button>
  </div>
</div>

<!-- ── Skill selection (after rival defeat) ──────────── -->
<div id="screen-skill" class="screen">
  <div class="skill-header">
    <div class="skill-title">✨ スキル選択</div>
    <div class="skill-sub">1つ選んで次のライバルに備えよう！</div>
  </div>
  <div class="skill-cards" id="skill-cards"></div>
</div>

<!-- ── Victory ────────────────────────────────────────── -->
<div id="screen-victory" class="screen">
  <div class="victory-inner">
    <div class="victory-trophy">🏆</div>
    <h2>完全制覇！！</h2>
    <div id="victory-score"></div>
    <div id="victory-detail"></div>
    <button id="btn-again"  class="btn-primary">もう一度！</button>
    <button id="btn-vtitle" class="btn-secondary">タイトルへ</button>
  </div>
</div>

<!-- ── Game over ─────────────────────────────────────── -->
<div id="screen-gameover" class="screen">
  <div class="gameover-inner">
    <div class="gameover-skull">💀</div>
    <h2>ゲームオーバー</h2>
    <div id="final-score"></div>
    <div id="final-detail"></div>
    <button id="btn-retry" class="btn-primary">もう一度！</button>
    <button id="btn-title" class="btn-secondary">タイトルへ</button>
  </div>
</div>

<!-- ── Stage transition overlay ───────────────────────── -->
<div id="stage-trans" class="stage-trans hidden">
  <div class="stage-num" id="trans-stage"></div>
  <div class="stage-vs">VS</div>
  <div class="stage-rival-icon" id="trans-icon"></div>
  <div class="stage-rival-name" id="trans-name"></div>
  <div class="stage-rival-flavor" id="trans-flavor"></div>
</div>

<!-- ── Effects ────────────────────────────────────────── -->
<div id="screen-flash" class="screen-flash"></div>
<div id="popup-layer"  class="popup-layer"></div>
<div id="move-name"    class="move-name"><div id="move-name-text" class="move-name-text"></div></div>
<div id="game-toast"   class="game-toast"></div>

<script src="js/tiles.js"></script>
<script src="js/problems.js"></script>
<script src="js/game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>全牌確認</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body{background:#1a3a1a;color:white;padding:10px;margin:0;}
.row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
h3{color:#ffd700;margin:6px 0 2px;font-size:15px;}
.tile{width:52px!important;height:68px!important;}
</style>
</head>
<body>
<h2 style="margin:4px;color:#ffd700">全牌確認 (SVGスプライト)</h2>
<h3>字牌</h3><div class="row" id="r-z"></div>
<h3>萬子</h3><div class="row" id="r-m"></div>
<h3>索子</h3><div class="row" id="r-s"></div>
<h3>筒子</h3><div class="row" id="r-p"></div>
<script>
var suits = [
  {id:'r-z', tiles:['1z','2z','3z','4z','5z','6z','7z']},
  {id:'r-m', tiles:['1m','2m','3m','4m','5m','6m','7m','8m','9m']},
  {id:'r-s', tiles:['1s','2s','3s','4s','5s','6s','7s','8s','9s']},
  {id:'r-p', tiles:['1p','2p','3p','4p','5p','6p','7p','8p','9p']},
];
suits.forEach(function(s){
  var row = document.getElementById(s.id);
  s.tiles.forEach(function(t){
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:inline-flex;flex-direction:column;align-items:center;gap:2px;';
    var img = document.createElement('object');
    img.type = 'image/svg+xml';
    img.data = '/images/' + t + '.svg?' + Date.now();
    img.style.cssText = 'width:auto;height:90px;display:block;';
    img.title = t;
    var lbl = document.createElement('span');
    lbl.textContent = t;
    lbl.style.cssText = 'font-size:11px;color:#aaa;';
    wrap.appendChild(img);
    wrap.appendChild(lbl);
    row.appendChild(wrap);
  });
});
</script>
</body>
</html>
